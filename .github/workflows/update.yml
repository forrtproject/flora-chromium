name: Update Retractions

on:
  schedule:
    - cron: '0 0 * *  *'
  workflow_dispatch:
    branches: [ main ]

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: node retractions-updater.ts
        uses: peter-evans/create-pull-request@v6
        with:
          labels: data-update
          branch: data-nightly
          title: Retraction data update
          delete-branch: true