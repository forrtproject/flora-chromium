name: Update Retractions

on:
  schedule:
    - cron: '0 0 * *  *'
  workflow_dispatch:
    branches: [ main ]

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: node retractions-updater.ts
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/retractions.json
          git diff --staged --quiet && echo "No changes" || (git commit -m "update retractions data" && git push)