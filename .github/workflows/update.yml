# Refreshes src/retractions.json from the Retraction Watch database.
#
# Data source: The Retraction Watch Database, made available by The Center
# for Scientific Integrity / Retraction Watch in partnership with Crossref
# under CC-BY 4.0, mirrored at:
#   https://gitlab.com/crossref/retraction-watch-data
#
# Please credit Retraction Watch when using this data downstream.

name: Update Retractions

on:
  schedule:
    # Upstream's `build-retractionwatch-csv` job commits ~23:00 UTC daily;
    # we run shortly after so the cached file tracks the latest build.
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Skip if upstream has no recent commit
        id: check
        env:
          # Upstream rebuilds daily, so 26h leaves a small slack window before
          # we treat a silent day as "nothing new to fetch".
          MAX_AGE_HOURS: "26"
        run: |
          set -euo pipefail
          curl -sSfL "https://gitlab.com/api/v4/projects/crossref%2Fretraction-watch-data/repository/commits?path=retraction_watch.csv&per_page=1" -o /tmp/last_commit.json
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json, os, sys
          from datetime import datetime, timezone
          with open("/tmp/last_commit.json") as f:
              commits = json.load(f)
          if not commits:
              print("No upstream commits returned by GitLab API.", file=sys.stderr)
              print("skip=true")
              sys.exit(0)
          ts = commits[0]["committed_date"]
          last = datetime.fromisoformat(ts)
          age_hours = (datetime.now(timezone.utc) - last).total_seconds() / 3600
          print(f"Last upstream commit: {ts} ({age_hours:.1f}h ago)", file=sys.stderr)
          max_age = float(os.environ["MAX_AGE_HOURS"])
          print("skip=true" if age_hours > max_age else "skip=false")
          PY

      - uses: actions/setup-node@v6
        if: steps.check.outputs.skip == 'false'
        with:
          node-version: 24

      - run: node retractions-updater.ts
        if: steps.check.outputs.skip == 'false'

      - name: Commit changes
        if: steps.check.outputs.skip == 'false'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/retractions.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Data: refresh Retraction Watch retractions cache

          Source: Retraction Watch Database (CC-BY 4.0), via Crossref mirror at
          https://gitlab.com/crossref/retraction-watch-data. Credit: Retraction
          Watch / The Center for Scientific Integrity."
            git push
          fi
