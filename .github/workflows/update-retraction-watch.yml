# Updates data/retraction_watch_dois.csv from the Retraction Watch database.
#
# Data source: The Retraction Watch Database, made available by The Center for
# Scientific Integrity / Retraction Watch in partnership with Crossref under
# CC-BY 4.0, mirrored at:
#   https://gitlab.com/crossref/retraction-watch-data
#
# Please credit Retraction Watch when using this data downstream.

name: Update Retraction Watch DOI cache

on:
  schedule:
    - cron: "17 4 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for recent upstream commit
        id: check
        env:
          MAX_AGE_HOURS: "30"
        run: |
          set -euo pipefail
          curl -sSfL "https://gitlab.com/api/v4/projects/crossref%2Fretraction-watch-data/repository/commits?path=retraction_watch.csv&per_page=1" -o /tmp/last_commit.json
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json, os, sys
          from datetime import datetime, timezone
          with open("/tmp/last_commit.json") as f:
              commits = json.load(f)
          if not commits:
              print("No upstream commits returned by GitLab API.", file=sys.stderr)
              print("skip=true")
              sys.exit(0)
          ts = commits[0]["committed_date"]
          last = datetime.fromisoformat(ts)
          age_hours = (datetime.now(timezone.utc) - last).total_seconds() / 3600
          print(f"Last upstream commit: {ts} ({age_hours:.1f}h ago)", file=sys.stderr)
          max_age = float(os.environ["MAX_AGE_HOURS"])
          print("skip=true" if age_hours > max_age else "skip=false")
          PY

      - name: Download CSV and extract DOI columns
        if: steps.check.outputs.skip == 'false'
        run: |
          set -euo pipefail
          mkdir -p data
          curl -sSfL "https://gitlab.com/crossref/retraction-watch-data/-/raw/main/retraction_watch.csv?ref_type=heads" -o /tmp/retraction_watch.csv
          python3 - <<'PY'
          import csv
          with open("/tmp/retraction_watch.csv", newline="", encoding="utf-8") as inf, \
               open("data/retraction_watch_dois.csv", "w", newline="", encoding="utf-8") as outf:
              reader = csv.DictReader(inf)
              missing = {"OriginalPaperDOI", "RetractionDOI"} - set(reader.fieldnames or [])
              if missing:
                  raise SystemExit(f"Upstream CSV is missing expected columns: {missing}")
              writer = csv.writer(outf)
              writer.writerow(["OriginalPaperDOI", "RetractionDOI"])
              for row in reader:
                  writer.writerow([row["OriginalPaperDOI"], row["RetractionDOI"]])
          PY

      - name: Commit changes
        if: steps.check.outputs.skip == 'false'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/retraction_watch_dois.csv
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Data: refresh Retraction Watch DOI cache

          Source: Retraction Watch Database (CC-BY 4.0), via Crossref mirror at
          https://gitlab.com/crossref/retraction-watch-data. Credit: Retraction
          Watch / The Center for Scientific Integrity."
            git push
          fi
