name: Release

on:
  push:
    branches: [ main ]
    tags: ['*']
  pull_request:
    branches: [ main ]
  workflow_dispatch:


jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run test
      - run: npm run build
      - name: Create zip
        run: |
          mkdir -p flora-extension
          cp manifest.json flora-extension/
          cp -r dist flora-extension/
          zip -r flora-extension.zip flora-extension

      # see: https://github.com/marketplace/actions/gh-release#-customizing
      - name: Draft release
        if: github.ref_type != 'tag'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: draft
          files: flora-extension.zip
          draft: true          
      - name: Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v3
        with:
          files: flora-extension.zip
          make_latest: true
